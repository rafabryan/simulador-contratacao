<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\style.css">
    <script src="JS\skillMatch.js" defer></script>
    <title>SkillMatch JS: Simulador de Compatibilidade com Vaga Front-End Júnior</title>
</head>
<body>

  <div class="container">

    <h1>SkillMatch JS</h1>
    <p class="descricao">
      Simulador de Compatibilidade com Vagas
    </p>

    <section class="perfil">
      <h2>Perfil do Candidato</h2>

      <p><strong>Nome:</strong> <span id="nome"></span></p>
      <p><strong>Área:</strong> <span id="area"></span></p>
      <p><strong>Experiência:</strong> <span id="experiencia"></span> meses</p>

      <div class="habilidades" id="habilidades"></div>
    </section>

    <section class="vagas" id="vagasContainer"></section>

    <section class="melhor-vaga" id="melhorVaga"></section>

    <section class="estudos" id="estudos"></section>

    <footer>
      Projeto desenvolvido com HTML5, CSS3 e JavaScript
    </footer>

  </div>
</body>
</html>
