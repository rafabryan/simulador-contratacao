<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\style.css">
    <script src="JS\skillMatch.js" defer></script>
    <title>SkillMatch JS: Simulador de Compatibilidade com Vaga Front-End Júnior</title>
</head>
<body>
   <div class="container">
        <header>
            <h1>SkillMatch JS</h1>
            <p>Simulador de Compatibilidade com Vagas Front-End</p>
        </header>

        <!-- Perfil do Candidato -->
        <div class="card" id="perfilCandidato">
            <h2>👤 Perfil do Candidato: <span id="nomeCandidato"></span></h2>
            <p><strong>Habilidades Atuais:</strong></p>
            <div id="habilidadesCandidato"></div>
        </div>

        <!-- Botão para rodar a Engine -->
        <button class="btn" onclick="executarSimulador()">Rodar Motor de Análise 🚀</button>

        <!-- Resultado Final / Recomendação -->
        <div class="card" id="resultadoFinal">
            <h2>🏆 Resultado da Triagem</h2>
            <p><strong>Maior Compatibilidade:</strong> <span id="melhorVagaNome"></span> (<span id="melhorVagaPercentual"></span>%)</p>
            <p style="margin-top: 10px;"><strong>📚 Recomendação:</strong> <span id="recomendacaoTexto"></span></p>
        </div>

        <!-- Lista de Vagas Analisadas -->
        <div class="card" id="listaVagas" style="display: none;">
            <h2>🏢 Análise Detalhada das Vagas</h2>
            <div id="vagasContainer"></div>
        </div>
    </div>
</body>
</html>
