<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\style.css">
    <script src="JS\skillMatch.js" defer></script>
    <title>SkillMatch JS: Simulador de Compatibilidade com Vaga Front-End Júnior</title>
</head>
<body>
 
  <header>
    <h1>SkillMatch JS</h1>
    <p>Simulador de Compatibilidade com Vagas Front-End</p>
  </header>

  <main>

    <section class="candidato">
      <h2>Perfil do Candidato</h2>

      <div id="dados-candidato"></div>
    </section>

    <section class="vagas">
      <h2>Resultado das Vagas</h2>

      <div id="resultado-vagas"></div>
    </section>

    <section class="melhor-vaga">
      <h2>Vaga Mais Compatível</h2>

      <div id="melhor-vaga"></div>
    </section>

    <section class="recomendacao">
      <h2>Recomendação de Estudos</h2>

      <div id="recomendacao-estudos"></div>
    </section>

  </main>

  <footer>
    <p>Projeto SkillMatch JS - Mini Projeto Avaliativo</p>
  </footer>

</body>
</html>
